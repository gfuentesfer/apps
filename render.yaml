# Render Blueprint — https://render.com/docs/blueprint-spec
# Conecta el repo en Render → New → Blueprint y usa este archivo.
# Las variables secretas se configuran en el panel (no las pongas aquí).

services:
  - type: web
    name: myarrows-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PGHOST
        sync: false
      - key: PGPORT
        value: "5432"
      - key: PGDATABASE
        sync: false
      - key: PGUSER
        sync: false
      - key: PGPASSWORD
        sync: false
      - key: PGSSLMODE
        value: require
